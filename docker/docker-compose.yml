version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-books}
      POSTGRES_USER: ${POSTGRES_USER:-books}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-books}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-books}"]
      interval: 5s
      timeout: 5s
      retries: 10

  core:
    build:
      context: ..
      dockerfile: docker/Dockerfile.core
    env_file:
      - ../core/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../core:/app
    command: python run_import.py --help

  stubs:
    build:
      context: ..
      dockerfile: docker/Dockerfile.core
    env_file:
      - ../core/.env
    ports:
      - "5001:5001"
      - "5002:5002"
    command: python stubs/run_stubs.py

  viewer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.viewer
    env_file:
      - ../viewer/.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - ../viewer:/app
    command: python api/server.py

volumes:
  pg_data:

networks:
  default:
    driver: bridge
